<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Upload - APK Hub</title>
<link rel="stylesheet" href="../style.css">

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="../firebase-config.js"></script>
</head>
<body>
<header>
  <h1>Admin Panel - Upload APK</h1>
</header>

<nav>
  <a href="../index.html">Home</a>
  <a href="about.html">About</a>
</nav>

<main>
  <form id="apkForm">
    <input type="text" id="apkName" placeholder="APK Name" required><br><br>
    <input type="file" id="apkFile" accept=".apk" required><br><br>
    <input type="file" id="apkIcon" accept="image/*" required><br><br>
    <button type="submit">Upload APK</button>
  </form>

  <p id="status"></p>
  <div id="progressContainer" style="width:100%; background:#333; height:20px; margin-top:10px; border-radius:10px;">
    <div id="progressBar" style="width:0%; height:100%; background:#ff5c5c; border-radius:10px;"></div>
  </div>
</main>

<footer>
  <p>© 2026 APK Hub</p>
</footer>

<!-- Upload Script -->
<script>
const form = document.getElementById('apkForm');
const status = document.getElementById('status');
const progressBar = document.getElementById('progressBar');

form.addEventListener('submit', async e => {
  e.preventDefault();
  const name = document.getElementById('apkName').value;
  const apkFile = document.getElementById('apkFile').files[0];
  const iconFile = document.getElementById('apkIcon').files[0];

  if (!name || !apkFile || !iconFile) return;

  status.innerText = "Uploading...";
  progressBar.style.width = '0%';

  // Upload APK
  const apkRef = storage.ref('apks/' + apkFile.name);
  const apkUploadTask = apkRef.put(apkFile);

  apkUploadTask.on('state_changed',
    snapshot => {
      const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
      progressBar.style.width = progress + '%';
      status.innerText = 'Uploading APK: ' + Math.floor(progress) + '%';
    },
    error => { status.innerText = 'Upload failed!'; console.error(error); },
    async () => {
      const apkURL = await apkUploadTask.snapshot.ref.getDownloadURL();

      // Upload Icon
      const iconRef = storage.ref('images/' + iconFile.name);
      const iconUploadTask = iconRef.put(iconFile);

      iconUploadTask.on('state_changed',
        snapshot => {
          const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
          progressBar.style.width = progress + '%';
          status.innerText = 'Uploading Icon: ' + Math.floor(progress) + '%';
        },
        error => { status.innerText = 'Upload failed!'; console.error(error); },
        async () => {
          const iconURL = await iconUploadTask.snapshot.ref.getDownloadURL();
          await db.collection('apks').add({
            name: name,
            apkURL: apkURL,
            iconURL: iconURL,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
          status.innerText = "Upload complete!";
          progressBar.style.width = '100%';
          form.reset();
        }
      );
    }
  );
});
</script>

</body>
</html>
