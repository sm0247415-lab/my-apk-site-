
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="../style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="../firebase-config.js"></script>
</head>
<body>
<header>
  <h1>Admin Panel - Upload APK</h1>
</header>

<main>
  <form id="apkForm">
    <input type="text" id="apkName" placeholder="APK Name" required><br><br>
    <input type="file" id="apkFile" accept=".apk" required><br><br>
    <input type="file" id="apkIcon" accept="image/*" required><br><br>
    <button type="submit">Upload APK</button>
  </form>
  <p id="status"></p>
</main>

<script>
const form = document.getElementById('apkForm');
const status = document.getElementById('status');

form.addEventListener('submit', async e=>{
  e.preventDefault();
  
  const name = document.getElementById('apkName').value;
  const apkFile = document.getElementById('apkFile').files[0];
  const iconFile = document.getElementById('apkIcon').files[0];

  if(!name || !apkFile || !iconFile) return;

  status.innerText = "Uploading...";

  // Upload APK
  const apkRef = storage.ref('apks/' + apkFile.name);
  const apkSnapshot = await apkRef.put(apkFile);
  const apkURL = await apkSnapshot.ref.getDownloadURL();

  // Upload Icon
  const iconRef = storage.ref('images/' + iconFile.name);
  const iconSnapshot = await iconRef.put(iconFile);
  const iconURL = await iconSnapshot.ref.getDownloadURL();

  // Save info to Firestore
  await db.collection('apks').add({
    name: name,
    apkURL: apkURL,
    iconURL: iconURL,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });

  status.innerText = "Upload complete!";
  form.reset();
});
</script>
</body>
</html>
