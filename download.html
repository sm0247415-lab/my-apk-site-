<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download APK</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Download APK</h1>
</header>

<main>
  <a id="apk-btn" href="#" download class="download-btn">Download APK</a>
</main>

<script>
const urlParams = new URLSearchParams(window.location.search);
const apkURL = urlParams.get('apkURL');

if(apkURL){
  const btn = document.getElementById('apk-btn');
  btn.href = decodeURIComponent(apkURL);
  btn.innerText = "Download APK";
}
</script>
</body>
</html>
